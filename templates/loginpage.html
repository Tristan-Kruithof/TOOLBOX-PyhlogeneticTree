{% extends "main.html" %}

{% block content %}
    <div class="home-boxes">
    {% if login_status == True %}
        <div class="side_to_side center">
            <div>
                {{ login_message }}
            </div>
            <a href="{{ url_for('signup_route') }}" class="nav_button">Sign Out</a>
        </div>



    {% elif login_status == False %}

        <div class="side_to_side center">
            {{ login_message }}
        </div>



    {% else %}
        <form action="" method="POST">
            <label for="email">Fill in your email!</label>
            <input id="email" type="email" name="email" placeholder="Email address" required><br><br>

            <label for="newsletter">Sign up for our newsletter!</label>
            <input type="checkbox" name="newsletter" id="newsletter">
            <button type="submit" name="submit">Login</button>
        </form>
    {% endif %}
    </div>
{% endblock %}
