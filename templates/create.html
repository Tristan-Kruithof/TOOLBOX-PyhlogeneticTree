{% extends "main.html" %}

<div class="home-boxes">

    <img src="{{ url_for('static', filename="pipeline_output/" + image) }}" class="create_image" alt="math photo" id="imgbox">
    {% endif %}

    <form method="POST" action="">

            </p>
        </div>
    {% endif %}
{% endblock %}

{% endblock %}
